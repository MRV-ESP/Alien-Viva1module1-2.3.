<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Español – Viva 1 Mod 1 & 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
  #canvas { display: block; margin: 0 auto; background: #0a0a1a; cursor: none; }

  /* SCREENS */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a1a; z-index: 10; }
  .screen.hidden { display: none; }

  h1 { font-size: 2.8rem; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; letter-spacing: 4px; margin-bottom: 0.3rem; }
  h2 { font-size: 1.2rem; color: #7affdf; letter-spacing: 2px; margin-bottom: 2rem; }

  .btn { background: transparent; border: 2px solid #00ffcc; color: #00ffcc; font-family: 'Courier New', monospace; font-size: 1rem; padding: 0.7rem 2rem; margin: 0.4rem; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
  .btn:hover { background: #00ffcc; color: #0a0a1a; box-shadow: 0 0 15px #00ffcc; }
  .btn.active { background: #00ffcc; color: #0a0a1a; }

  .topic-grid { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
  .topic-btn { font-size: 0.85rem; padding: 0.5rem 1.2rem; }

  #highscore-display { color: #ffd700; font-size: 1rem; margin-bottom: 1rem; letter-spacing: 1px; }
  #score-history { font-size: 0.8rem; color: #7affdf; margin-bottom: 1.5rem; text-align: center; line-height: 1.8; }

  /* GAME OVER */
  #final-score { font-size: 2rem; color: #ffd700; margin: 0.5rem 0; }
  #final-level { font-size: 1rem; color: #7affdf; margin-bottom: 1.5rem; }
  #new-hs { color: #ffd700; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 0.5rem; display: none; }

  /* FLASH */
  #flash { position: fixed; inset: 0; pointer-events: none; z-index: 20; opacity: 0; transition: opacity 0.1s; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen" class="screen">
  <h1>👾 ALIEN ESPAÑOL</h1>
  <h2>VIVA 1 — MÓDULO 1 &amp; 2</h2>

  <div id="highscore-display">🏆 HIGH SCORE: 0</div>

  <p style="color:#aaa; font-size:0.85rem; margin-bottom:0.8rem; letter-spacing:1px;">SELECT TOPICS:</p>
  <div class="topic-grid">
    <button class="btn topic-btn active" data-topic="mod1">MOD 1 – GREETINGS &amp; NUMBERS</button>
    <button class="btn topic-btn active" data-topic="mod21">MOD 2.1 – APPEARANCE</button>
    <button class="btn topic-btn active" data-topic="mod22">MOD 2.2 – PERSONALITY</button>
    <button class="btn topic-btn active" data-topic="mod23">MOD 2.3 – FAMILY</button>
  </div>

  <div id="score-history"></div>
  <button class="btn" id="start-btn" style="font-size:1.2rem; padding:0.9rem 3rem;">▶ START GAME</button>
  <p style="color:#555; font-size:0.75rem; margin-top:1rem;">← → to move &nbsp;|&nbsp; SPACE to fire</p>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="screen hidden">
  <h1 style="color:#ff4466;">GAME OVER</h1>
  <div id="new-hs">⭐ NEW HIGH SCORE! ⭐</div>
  <div id="final-score"></div>
  <div id="final-level"></div>
  <div id="score-history-go" style="font-size:0.8rem;color:#7affdf;margin-bottom:1.5rem;text-align:center;line-height:1.8;"></div>
  <button class="btn" id="play-again-btn">↩ PLAY AGAIN</button>
  <button class="btn" id="menu-btn">☰ MENU</button>
</div>

<!-- FLASH OVERLAY -->
<div id="flash"></div>

<canvas id="canvas"></canvas>

// ─── GAME STATE ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');

let W, H;
function resize() {
  W = canvas.width  = Math.min(window.innerWidth,  900);
  H = canvas.height = Math.min(window.innerHeight, 700);
}
resize();
window.addEventListener('resize', resize);

let state = 'menu';
let score, lives, level, combo, comboTimer;
let aliens = [], bullets = [], particles = [];
let ship, spawnTimer, spawnInterval, questionTimer;
let currentQ, activeTopics, pool;
let highScore = parseInt(localStorage.getItem('hs_viva1') || '0');
let scoreHistory = JSON.parse(localStorage.getItem('sh_viva1') || '[]');

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); fireBullet(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ─── TOPIC TOGGLES ──────────────────────────────────────────────────────────────
const topicButtons = document.querySelectorAll('.topic-btn');
let selectedTopics = new Set(['mod1','mod21','mod22','mod23']);
topicButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.topic;
    if (selectedTopics.has(t)) {
      if (selectedTopics.size > 1) { selectedTopics.delete(t); btn.classList.remove('active'); }
    } else {
      selectedTopics.add(t); btn.classList.add('active');
    }
  });
});

// ─── QUESTION LOGIC ─────────────────────────────────────────────────────────────
function buildPool() {
  pool = [];
  selectedTopics.forEach(t => pool.push(...(vocab[t] || [])));
  // shuffle
  for (let i = pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
}

function newQuestion() {
  if (!pool.length) buildPool();
  const item = pool.splice(0,1)[0];
  const esFirst = Math.random() < 0.5;
  currentQ = {
    prompt: esFirst ? item.en : item.es,
    answer: esFirst ? item.es : item.en,
    isEsPrompt: !esFirst
  };
  return currentQ;
}

function getWrongAnswers(correct, count) {
  const all = [];
  selectedTopics.forEach(t => all.push(...vocab[t]));
  const esFirst = !currentQ.isEsPrompt;
  const candidates = all.map(v => esFirst ? v.es : v.en).filter(v => v !== correct);
  const shuffled = candidates.sort(() => Math.random()-0.5);
  return shuffled.slice(0, count);
}

// ─── SHIP ───────────────────────────────────────────────────────────────────────
function initShip() {
  ship = { x: W/2, y: H - 50, w: 40, h: 30, spd: 12, shooting: false };
}

function fireBullet() {
  if (state !== 'playing') return;
  bullets.push({ x: ship.x, y: ship.y - 15, spd: 14, active: true });
}

// ─── ALIENS ─────────────────────────────────────────────────────────────────────
const ALIEN_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f1c'];
const ALIEN_EMOJIS = ['👾','🛸','🤖','👽','🔮','💀'];

function spawnAlienWave() {
  const q = newQuestion();
  const wrongAnswers = getWrongAnswers(q.answer, Math.min(3 + Math.floor(level/3), 5));
  const allAnswers = [q.answer, ...wrongAnswers].sort(() => Math.random()-0.5);

  const count = allAnswers.length;
  const spacing = W / (count + 1);
  const startY = -60;
  const spd = 0.5 + level * 0.18;

  allAnswers.forEach((ans, i) => {
    aliens.push({
      x: spacing * (i + 1),
      y: startY - i * 15,
      w: 70, h: 45,
      label: ans,
      isCorrect: ans === q.answer,
      spd,
      color: ALIEN_COLORS[i % ALIEN_COLORS.length],
      emoji: ALIEN_EMOJIS[i % ALIEN_EMOJIS.length],
      hit: false,
      wobble: Math.random() * Math.PI * 2
    });
  });
}

// ─── PARTICLES ──────────────────────────────────────────────────────────────────
function explode(x, y, color, count=14) {
  for (let i=0; i<count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const spd = 2 + Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      life: 1,
      color,
      size: 3+Math.random()*4
    });
  }
}

// ─── FLASH ──────────────────────────────────────────────────────────────────────
function doFlash(color) {
  flash.style.background = color;
  flash.style.opacity = '0.35';
  setTimeout(()=>{ flash.style.opacity='0'; }, 150);
}

// ─── DRAW ───────────────────────────────────────────────────────────────────────
function drawStars() {
  if (!drawStars.stars) {
    drawStars.stars = Array.from({length:80}, ()=>({ x:Math.random()*900, y:Math.random()*700, r:Math.random()*1.5, b:Math.random() }));
  }
  drawStars.stars.forEach(s => {
    ctx.globalAlpha = 0.4 + 0.6*Math.abs(Math.sin(Date.now()/2000 + s.b*10));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawShip() {
  const x = ship.x, y = ship.y;
  // Body
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath();
  ctx.moveTo(x, y - 20);
  ctx.lineTo(x - 18, y + 12);
  ctx.lineTo(x + 18, y + 12);
  ctx.closePath();
  ctx.fill();
  // Barrel
  ctx.fillStyle = '#7affdf';
  ctx.fillRect(x - 3, y - 28, 6, 14);
  // Wings
  ctx.fillStyle = '#00ccaa';
  ctx.beginPath();
  ctx.moveTo(x - 18, y + 12);
  ctx.lineTo(x - 30, y + 20);
  ctx.lineTo(x - 10, y + 12);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 18, y + 12);
  ctx.lineTo(x + 30, y + 20);
  ctx.lineTo(x + 10, y + 12);
  ctx.closePath();
  ctx.fill();
  // Aim line
  ctx.strokeStyle = 'rgba(0,255,204,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  ctx.beginPath();
  ctx.moveTo(x, y - 28);
  ctx.lineTo(x, 0);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawAlien(a) {
  a.wobble += 0.04;
  const wx = Math.sin(a.wobble) * 3;
  const x = a.x + wx, y = a.y;

  // Glow
  ctx.shadowColor = a.color;
  ctx.shadowBlur = 12;
  ctx.fillStyle = a.color + '33';
  ctx.beginPath();
  ctx.ellipse(x, y, a.w/2+6, a.h/2+6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Body
  ctx.fillStyle = a.color + '55';
  ctx.strokeStyle = a.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(x, y, a.w/2, a.h/2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  // Emoji
  ctx.font = '18px serif';
  ctx.textAlign = 'center';
  ctx.fillText(a.emoji, x, y - 2);

  // Label — wrap if too long
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  const words = a.label.split(' ');
  if (words.length > 2 && a.label.length > 14) {
    const mid = Math.ceil(words.length/2);
    ctx.fillText(words.slice(0,mid).join(' '), x, y + 16);
    ctx.fillText(words.slice(mid).join(' '), x, y + 28);
  } else {
    ctx.fillText(a.label, x, y + 18);
  }
}

function drawBullet(b) {
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(b.x, b.y, 3, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#00ffcc';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 12, 24);

  // Level
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, W/2, 24);

  // High score
  ctx.fillStyle = '#7affdf';
  ctx.textAlign = 'right';
  ctx.fillText(`HI: ${highScore}`, W-12, 24);

  // Lives
  for (let i=0; i<lives; i++) {
    ctx.fillStyle = '#ff4466';
    ctx.font = '18px serif';
    ctx.fillText('♥', W-12 - i*24, 48);
  }

  // Question prompt
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 8;
  ctx.fillText(`➤  ${currentQ ? currentQ.prompt : ''}`, W/2, H - 18);
  ctx.shadowBlur = 0;

  // Combo
  if (combo >= 3) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`🔥 COMBO x${combo}`, 12, 48);
  }
}

// ─── UPDATE ─────────────────────────────────────────────────────────────────────
function update(dt) {
  // Move ship
  if (keys['ArrowLeft'] || keys['KeyA']) ship.x = Math.max(20, ship.x - ship.spd);
  if (keys['ArrowRight'] || keys['KeyD']) ship.x = Math.min(W-20, ship.x + ship.spd);

  // Move bullets
  bullets.forEach(b => { b.y -= b.spd; });
  bullets = bullets.filter(b => b.y > 0);

  // Move aliens
  aliens.forEach(a => { a.y += a.spd; });

  // Bullet-alien collision
  bullets.forEach(b => {
    if (!b.active) return;
    aliens.forEach(a => {
      if (a.hit) return;
      if (Math.abs(b.x - a.x) < a.w/2 && Math.abs(b.y - a.y) < a.h/2) {
        b.active = false;
        a.hit = true;
        if (a.isCorrect) {
          // Correct!
          combo++;
          const bonus = combo >= 3 ? 5 : 0;
          score += 10 + bonus + level;
          explode(a.x, a.y, '#00ffcc', 18);
          doFlash('#00ffcc');
          // remove other aliens from this wave
          aliens.forEach(o => { if (!o.isCorrect) o.hit = true; });
          setTimeout(() => spawnAlienWave(), 400);
        } else {
          // Wrong!
          combo = 0;
          lives--;
          explode(a.x, a.y, '#ff4466', 12);
          doFlash('#ff4466');
          if (lives <= 0) endGame();
        }
      }
    });
  });
  bullets = bullets.filter(b => b.active);

  // Alien reaches bottom
  aliens.forEach(a => {
    if (!a.hit && a.y > H + 30) {
      if (a.isCorrect) {
        a.hit = true;
        combo = 0;
        lives--;
        doFlash('#ff4466');
        aliens.forEach(o => { if (!o.isCorrect) o.hit = true; });
        if (lives <= 0) { endGame(); return; }
        setTimeout(() => spawnAlienWave(), 400);
      } else {
        a.hit = true;
      }
    }
  });
  aliens = aliens.filter(a => !a.hit);

  // Level up
  const nextLevel = Math.floor(score / 80) + 1;
  if (nextLevel > level) { level = nextLevel; }

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.035;
  });
  particles = particles.filter(p => p.life > 0);
}

// ─── DRAW PARTICLES ─────────────────────────────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── LOOP ───────────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  if (state === 'playing') {
    ctx.clearRect(0,0,W,H);
    drawStars();
    drawShip();
    aliens.forEach(drawAlien);
    bullets.forEach(drawBullet);
    drawParticles();
    drawHUD();
    update(dt);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── GAME CONTROL ───────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1; combo = 0;
  aliens = []; bullets = []; particles = [];
  buildPool();
  initShip();
  spawnAlienWave();
  state = 'playing';
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

function endGame() {
  state = 'gameover';
  const isNewHS = score > highScore;
  if (isNewHS) { highScore = score; localStorage.setItem('hs_viva1', highScore); }

  scoreHistory.unshift({ score, level, date: new Date().toLocaleDateString('en-AU') });
  if (scoreHistory.length > 8) scoreHistory = scoreHistory.slice(0,8);
  localStorage.setItem('sh_viva1', JSON.stringify(scoreHistory));

  document.getElementById('final-score').textContent = `SCORE: ${score}`;
  document.getElementById('final-level').textContent = `Reached Level ${level}`;
  document.getElementById('new-hs').style.display = isNewHS ? 'block' : 'none';
  renderHistory('score-history-go');
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function renderHistory(id) {
  const el = document.getElementById(id);
  if (!scoreHistory.length) { el.textContent = ''; return; }
  el.innerHTML = '<span style="color:#aaa">— SCORE HISTORY —</span><br>' +
    scoreHistory.map((s,i) => `${i+1}. ${s.date} &nbsp; Score: ${s.score} &nbsp; Lv ${s.level}`).join('<br>');
}

function showMenu() {
  state = 'menu';
  document.getElementById('highscore-display').textContent = `🏆 HIGH SCORE: ${highScore}`;
  renderHistory('score-history');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', startGame);
document.getElementById('menu-btn').addEventListener('click', showMenu);

// Mobile touch: drag to move cannon, tap to fire
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  fireBullet();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchX;
  ship.x = Math.max(20, Math.min(W-20, ship.x + dx));
  touchX = e.touches[0].clientX;
}, {passive:false});

// Init menu
showMenu();
</script>
